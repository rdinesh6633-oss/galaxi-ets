<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxi ETS — Electronics Inventory & Project Management</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f0e;
  --bg2:#141614;
  --bg3:#1a1c1a;
  --bg4:#212421;
  --bg5:#272a27;
  --border:#2e312e;
  --border2:#3a3e3a;
  --text:#e8ebe5;
  --text2:#9ba89a;
  --text3:#637063;
  --accent:#4ade80;
  --accent2:#22c55e;
  --accent-dim:rgba(74,222,128,0.12);
  --accent-dim2:rgba(74,222,128,0.06);
  --warn:#f59e0b;
  --warn-dim:rgba(245,158,11,0.12);
  --danger:#f87171;
  --danger-dim:rgba(248,113,113,0.12);
  --info:#60a5fa;
  --info-dim:rgba(96,165,250,0.12);
  --purple:#a78bfa;
  --purple-dim:rgba(167,139,250,0.12);
  --font:'IBM Plex Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --r:6px;
  --r2:10px;
  --sidebar:220px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
input,select,textarea,button{font-family:var(--font);font-size:13px}
button{cursor:pointer}

/* ── Layout ── */
#app{display:flex;height:100vh}

/* ── Sidebar ── */
#sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .25s ease;
}
.logo{
  padding:20px 16px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.logo-mark{
  width:30px;height:30px;border-radius:8px;
  background:var(--accent);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-mark svg{width:16px;height:16px;color:#0d0f0e}
.logo-text{overflow:hidden}
.logo-name{font-size:14px;font-weight:600;color:var(--text);letter-spacing:.02em}
.logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.05em;margin-top:1px}

.nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-group{margin-bottom:4px}
.nav-label{
  font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);padding:10px 16px 4px;font-family:var(--mono);
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:7px 16px;cursor:pointer;
  color:var(--text2);font-size:13px;font-weight:400;
  transition:all .15s;position:relative;border-radius:0;
  white-space:nowrap;overflow:hidden;
}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--accent);background:var(--accent-dim2)}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--accent);border-radius:0 2px 2px 0;
}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-badge{
  margin-left:auto;background:var(--danger-dim);color:var(--danger);
  font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;
  font-family:var(--mono);
}

.sidebar-footer{
  padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;
}
.user-card{
  display:flex;align-items:center;gap:10px;padding:8px 10px;
  background:var(--bg3);border-radius:var(--r);cursor:pointer;
  transition:background .15s;
}
.user-card:hover{background:var(--bg4)}
.user-avatar{
  width:28px;height:28px;border-radius:50%;
  background:var(--accent);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#0d0f0e;flex-shrink:0;font-family:var(--mono);
}
.user-name{font-size:12px;font-weight:500;color:var(--text)}
.user-role{font-size:10px;color:var(--text3);font-family:var(--mono)}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── Topbar ── */
#topbar{
  height:52px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;flex-shrink:0;gap:16px;
}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-breadcrumb{font-size:11px;color:var(--text3);font-family:var(--mono)}
.topbar-right{display:flex;align-items:center;gap:8px}

.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  padding:0 10px;height:32px;transition:border-color .15s;
}
.search-box:focus-within{border-color:var(--border2)}
.search-box svg{width:13px;height:13px;color:var(--text3);flex-shrink:0}
.search-box input{
  background:transparent;border:none;outline:none;
  color:var(--text);font-size:12px;width:180px;
}
.search-box input::placeholder{color:var(--text3)}

.icon-btn{
  width:32px;height:32px;border-radius:var(--r);
  background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .15s;position:relative;
}
.icon-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.icon-btn svg{width:14px;height:14px}
.notif-dot{
  position:absolute;top:5px;right:5px;width:6px;height:6px;
  background:var(--danger);border-radius:50%;border:1.5px solid var(--bg2);
}

/* ── Content ── */
#content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}
.page.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── Page Header ── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px}
.page-header-left h1{font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px}
.page-header-left p{font-size:12px;color:var(--text3)}
.page-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:0 14px;height:32px;border-radius:var(--r);
  font-size:12px;font-weight:500;border:none;transition:all .15s;
  white-space:nowrap;
}
.btn svg{width:13px;height:13px}
.btn-primary{background:var(--accent);color:#0d0f0e}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg4);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg5);border-color:var(--border2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(248,113,113,0.2)}
.btn-danger:hover{background:rgba(248,113,113,0.2)}
.btn-warn{background:var(--warn-dim);color:var(--warn);border:1px solid rgba(245,158,11,0.2)}
.btn-sm{height:26px;padding:0 10px;font-size:11px}

/* ── Metric Cards ── */
.metrics-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:24px}
.metric-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);
  padding:16px;position:relative;overflow:hidden;transition:border-color .15s;
}
.metric-card:hover{border-color:var(--border2)}
.metric-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--accent);opacity:0;transition:opacity .2s;
}
.metric-card.accent::after{opacity:1}
.metric-card.warn::after{background:var(--warn);opacity:1}
.metric-card.danger::after{background:var(--danger);opacity:1}
.metric-card.info::after{background:var(--info);opacity:1}
.m-label{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:.03em;margin-bottom:10px}
.m-value{font-size:26px;font-weight:600;color:var(--text);font-family:var(--mono);margin-bottom:6px;line-height:1}
.m-delta{font-size:11px;display:flex;align-items:center;gap:4px}
.m-delta.up{color:var(--accent)}
.m-delta.down{color:var(--danger)}
.m-delta.neutral{color:var(--text3)}

/* ── Cards ── */
.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);
  margin-bottom:16px;overflow:hidden;
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);
}
.card-title{font-size:13px;font-weight:600;color:var(--text)}
.card-body{padding:16px}
.card-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}

/* ── Grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text3);padding:10px 14px;border-bottom:1px solid var(--border);
  font-family:var(--mono);text-align:left;white-space:nowrap;
}
tbody td{
  padding:11px 14px;border-bottom:1px solid var(--border);
  color:var(--text2);vertical-align:middle;
}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg3);color:var(--text)}
.td-main{color:var(--text)!important;font-weight:500}
.td-mono{font-family:var(--mono);font-size:12px}

/* ── Tags ── */
.tag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;
  font-family:var(--mono);letter-spacing:.02em;white-space:nowrap;
}
.tag-green{background:rgba(74,222,128,0.12);color:#4ade80}
.tag-yellow{background:rgba(245,158,11,0.12);color:#f59e0b}
.tag-red{background:rgba(248,113,113,0.12);color:#f87171}
.tag-blue{background:rgba(96,165,250,0.12);color:#60a5fa}
.tag-purple{background:rgba(167,139,250,0.12);color:#a78bfa}
.tag-gray{background:rgba(99,112,99,0.2);color:#9ba89a}
.tag-orange{background:rgba(251,146,60,0.12);color:#fb923c}
.tag::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.input-field{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  padding:0 10px;height:32px;color:var(--text);outline:none;transition:border-color .15s;
}
.input-field:focus{border-color:var(--accent)}
.input-field::placeholder{color:var(--text3)}
.input-search{min-width:200px;padding-left:32px;position:relative}
.search-wrap{position:relative;display:inline-flex;align-items:center}
.search-wrap svg{position:absolute;left:10px;width:13px;height:13px;color:var(--text3);pointer-events:none}
select.input-field option{background:var(--bg3);color:var(--text)}
.toolbar-spacer{flex:1}

/* ── Flow Steps ── */
.flow-steps{
  display:flex;align-items:center;gap:0;
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);
  padding:14px 16px;margin-bottom:20px;overflow-x:auto;
}
.flow-step{display:flex;align-items:center;gap:0}
.step-box{
  display:flex;align-items:center;gap:8px;padding:6px 14px;
  border-radius:var(--r);font-size:12px;font-weight:500;
  background:var(--bg3);color:var(--text3);border:1px solid var(--border);
  white-space:nowrap;transition:all .2s;
}
.step-box .step-num{
  width:18px;height:18px;border-radius:50%;background:var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-family:var(--mono);font-weight:700;color:var(--text3);
  flex-shrink:0;
}
.step-box.done{background:rgba(74,222,128,0.08);color:var(--accent);border-color:rgba(74,222,128,0.2)}
.step-box.done .step-num{background:var(--accent);color:#0d0f0e}
.step-box.active{background:rgba(96,165,250,0.1);color:var(--info);border-color:rgba(96,165,250,0.25)}
.step-box.active .step-num{background:var(--info);color:#0d0f0e}
.step-arrow{color:var(--border2);font-size:16px;padding:0 6px;flex-shrink:0}

/* ── Alert Banner ── */
.alert-banner{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:var(--r);margin-bottom:16px;
  font-size:12px;border:1px solid;
}
.alert-warn{background:var(--warn-dim);color:var(--warn);border-color:rgba(245,158,11,0.25)}
.alert-danger{background:var(--danger-dim);color:var(--danger);border-color:rgba(248,113,113,0.25)}
.alert-info{background:var(--info-dim);color:var(--info);border-color:rgba(96,165,250,0.25)}
.alert-success{background:var(--accent-dim);color:var(--accent);border-color:rgba(74,222,128,0.25)}
.alert-banner svg{width:14px;height:14px;flex-shrink:0}

/* ── Progress Bar ── */
.prog-wrap{margin-bottom:10px}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.prog-track{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}
.prog-fill.ok{background:var(--accent)}
.prog-fill.warn{background:var(--warn)}
.prog-fill.low{background:var(--danger)}

/* ── BOM Match Items ── */
.bom-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:var(--r);margin-bottom:6px;
  background:var(--bg3);border:1px solid var(--border);transition:border-color .15s;
}
.bom-item:hover{border-color:var(--border2)}
.bom-status-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.bom-ok{background:rgba(74,222,128,0.15);color:var(--accent)}
.bom-warn{background:rgba(245,158,11,0.15);color:var(--warn)}
.bom-bad{background:rgba(248,113,113,0.15);color:var(--danger)}
.bom-name{flex:1}
.bom-part{font-size:12px;font-weight:500;color:var(--text)}
.bom-code{font-size:10px;color:var(--text3);font-family:var(--mono)}
.bom-qty{font-size:11px;color:var(--text3);text-align:right;min-width:100px}

/* ── Form ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.span2{grid-column:span 2}
.form-label{font-size:11px;font-weight:500;color:var(--text2);font-family:var(--mono);letter-spacing:.03em}
.form-control{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  padding:0 10px;height:34px;color:var(--text);outline:none;transition:border-color .15s;
  font-size:13px;
}
.form-control:focus{border-color:var(--accent)}
textarea.form-control{height:70px;padding:8px 10px;resize:vertical}
.form-control::placeholder{color:var(--text3)}
select.form-control option{background:var(--bg3)}
.form-hint{font-size:10px;color:var(--text3)}

/* ── Activity Feed ── */
.activity-list{display:flex;flex-direction:column}
.activity-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.activity-item:last-child{border-bottom:none}
.act-icon{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.act-icon svg{width:12px;height:12px}
.act-body{flex:1;min-width:0}
.act-text{font-size:12px;color:var(--text);line-height:1.4}
.act-text strong{color:var(--text);font-weight:600}
.act-meta{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:3px}

/* ── Approval Item ── */
.approval-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.approval-item:last-child{border-bottom:none}
.appr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.appr-info{flex:1;min-width:0}
.appr-title{font-size:12px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.appr-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.appr-actions{display:flex;gap:6px;flex-shrink:0}

/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  display:none;align-items:center;justify-content:center;z-index:1000;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  width:560px;max-width:95vw;max-height:90vh;overflow:hidden;
  display:flex;flex-direction:column;animation:modalIn .2s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.modal-title{font-size:14px;font-weight:600;color:var(--text)}
.modal-close{
  width:28px;height:28px;border-radius:var(--r);background:transparent;
  border:1px solid var(--border);color:var(--text2);
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.modal-close:hover{background:var(--bg3);color:var(--text)}
.modal-close svg{width:13px;height:13px}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

/* ── Toast ── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-radius:var(--r2);min-width:280px;
  animation:toastIn .25s ease;font-size:12px;font-weight:500;
  border:1px solid;backdrop-filter:blur(8px);
}
.toast-success{background:rgba(13,15,14,0.95);color:var(--accent);border-color:rgba(74,222,128,0.3)}
.toast-error{background:rgba(13,15,14,0.95);color:var(--danger);border-color:rgba(248,113,113,0.3)}
.toast-info{background:rgba(13,15,14,0.95);color:var(--info);border-color:rgba(96,165,250,0.3)}
.toast-warn{background:rgba(13,15,14,0.95);color:var(--warn);border-color:rgba(245,158,11,0.3)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast svg{width:14px;height:14px;flex-shrink:0}

/* ── Empty State ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 24px;color:var(--text3);gap:12px;
}
.empty-state svg{width:36px;height:36px;opacity:.3}
.empty-state p{font-size:13px}

/* ── Pagination ── */
.pagination{display:flex;align-items:center;gap:4px}
.page-btn{
  width:28px;height:28px;border-radius:var(--r);background:var(--bg3);
  border:1px solid var(--border);color:var(--text2);
  display:flex;align-items:center;justify-content:center;font-size:12px;
  font-family:var(--mono);transition:all .15s;
}
.page-btn:hover{background:var(--bg4);color:var(--text)}
.page-btn.active{background:var(--accent);color:#0d0f0e;border-color:transparent;font-weight:700}
.page-btn svg{width:11px;height:11px}

/* ── Dropdown ── */
.dropdown{position:relative;display:inline-block}
.dropdown-menu{
  position:absolute;top:calc(100% + 6px);right:0;
  background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);
  min-width:180px;z-index:200;display:none;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.dropdown-menu.open{display:block;animation:fadeIn .15s ease}
.dropdown-item{
  padding:9px 14px;font-size:12px;color:var(--text2);cursor:pointer;
  transition:all .15s;display:flex;align-items:center;gap:8px;
}
.dropdown-item:hover{background:var(--bg3);color:var(--text)}
.dropdown-item svg{width:13px;height:13px}
.dropdown-sep{height:1px;background:var(--border);margin:4px 0}

/* ── Stock Level Colors ── */
.stock-ok{color:var(--accent)}
.stock-low{color:var(--warn)}
.stock-out{color:var(--danger)}

/* ── Responsive ── */
@media(max-width:1100px){
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
}
@media(max-width:768px){
  :root{--sidebar:0px}
  #sidebar{display:none}
  .grid3{grid-template-columns:1fr}
}

/* ── Login ── */
#login-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:9999;
}
.login-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  width:400px;padding:40px;
}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.login-logo-mark{
  width:40px;height:40px;border-radius:10px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;
}
.login-logo-mark svg{width:22px;height:22px;color:#0d0f0e}
.login-logo-text{font-size:20px;font-weight:700;color:var(--text)}
.login-logo-sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.login-title{font-size:16px;font-weight:600;margin-bottom:6px}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:24px}
.login-users{
  background:var(--bg3);border-radius:var(--r);overflow:hidden;
  border:1px solid var(--border);margin-bottom:20px;
}
.login-user-row{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);
}
.login-user-row:last-child{border-bottom:none}
.login-user-row:hover{background:var(--bg4)}
.login-user-row.selected{background:var(--accent-dim)}
.lu-avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#0d0f0e;flex-shrink:0;font-family:var(--mono);
}
.lu-name{font-size:13px;font-weight:500;color:var(--text)}
.lu-role{font-size:10px;color:var(--text3);font-family:var(--mono)}
.lu-check{margin-left:auto;color:var(--accent);display:none}
.login-user-row.selected .lu-check{display:block}
</style>
</head>

function icon(name,size=14){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;

// HELPERS
// ══════════════════════════════════════════════
function toast(msg,type='success'){
  const t=document.createElement('div');
  const ic={success:'check',error:'x',info:'info',warn:'alert-triangle'}[type]||'info';
  t.className=`toast toast-${type}`;
  t.innerHTML=icon(ic)+`<span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},3000);
}
function openModal(title,bodyHTML,footerHTML=''){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=bodyHTML;
  document.getElementById('modal-footer').innerHTML=footerHTML||`<button class="btn btn-secondary" onclick="closeModal()">Close</button>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}
function closeModalIf(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
function showDropdown(id){
  const m=document.getElementById(id);
  if(m)m.classList.toggle('open');
  document.addEventListener('click',function h(e){
    if(!e.target.closest(`#${id}`)&&!e.target.closest(`[onclick*="${id}"]`)){
      if(m)m.classList.remove('open');document.removeEventListener('click',h);
    }
  });
}
function stockStatus(item){
  const avail=item.qty-item.reserved;
  if(avail<=0&&item.qty===0)return{tag:'tag-red',label:'Out of Stock'};
  if(item.qty<=item.alert)return{tag:'tag-yellow',label:'Low Stock'};
  return{tag:'tag-green',label:'Available'};
}
function woStatusTag(s){
  const m={erp_review:['tag-yellow','ERP Review'],cto_approval:['tag-blue','CTO Approval'],active:['tag-green','Active'],complete:['tag-gray','Complete'],rejected:['tag-red','Rejected']};
  return m[s]||['tag-gray',s];
}
function prStatusTag(s){
  const m={open:['tag-yellow','Open'],quotation:['tag-blue','Quotation Added'],po_raised:['tag-purple','PO Raised'],closed:['tag-green','Closed']};
  return m[s]||['tag-gray',s];
}
function grnQcTag(s){
  const m={pass:['tag-green','Pass'],fail:['tag-red','Fail'],pending:['tag-yellow','Pending']};
  return m[s]||['tag-gray',s];
}
function grnStatusTag(s){
  const m={stocked:['tag-green','Stocked'],qc_hold:['tag-yellow','QC Hold'],rejected:['tag-red','Rejected']};
  return m[s]||['tag-gray',s];
}
function icStatusTag(s){
  const m={pending:['tag-yellow','CTO Review'],approved:['tag-green','Approved'],alternate:['tag-blue','Alt. Suggested'],rejected:['tag-red','Rejected']};
  return m[s]||['tag-gray',s];
}
function can(page){
  if(!DB.currentUser)return false;
  return (PERMS[DB.currentUser.role]||[]).includes(page);
}
function getBadgeCount(id){
  if(id==='workorders'){
    return DB.workorders.filter(w=>w.status==='erp_review'||w.status==='cto_approval').length||'';
  }
  if(id==='itemcodes'){
    return DB.itemCodes.filter(i=>i.status==='pending').length||'';
  }
  return '';
}

let selectedUserId=1;
function buildLoginUsers(){
  const el=document.getElementById('login-users');
  el.innerHTML=DB.users.map(u=>`
    <div class="login-user-row${u.id===selectedUserId?' selected':''}" onclick="selectUser(${u.id})">
      <div class="lu-avatar" style="background:${u.color}">${u.initials}</div>
      <div><div class="lu-name">${u.name}</div><div class="lu-role">${DB.roleLabels[u.role]}</div></div>
      <div class="lu-check">${icon('check',14)}</div>
    </div>`).join('');
}
function selectUser(id){
  selectedUserId=id;
  document.querySelectorAll('.login-user-row').forEach(r=>{
    r.classList.toggle('selected',parseInt(r.getAttribute('onclick').match(/\d+/)[0])===id);
  });
}
function doLogin(){
  const u=DB.users.find(x=>x.id===selectedUserId);
  if(!u)return;
  DB.currentUser=u;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  // update UI
  document.getElementById('user-avatar-sidebar').textContent=u.initials;
  document.getElementById('user-avatar-sidebar').style.background=u.color;
  document.getElementById('user-name-sidebar').textContent=u.name;
  document.getElementById('user-role-sidebar').textContent=DB.roleLabels[u.role];
  document.getElementById('user-avatar-top').textContent=u.initials;
  document.getElementById('user-avatar-top').style.background=u.color;
  buildNav();
  showPage('dashboard');
  toast(`Welcome, ${u.name}!`,'success');
}

function buildNav(){
  const el=document.getElementById('nav-menu');
  const role=DB.currentUser.role;
  const allowed=PERMS[role]||[];
  el.innerHTML=ALL_NAV.map(group=>{
    const items=group.items.filter(i=>allowed.includes(i.id));
    if(!items.length)return'';
    return`<div class="nav-group">
      <div class="nav-label">${group.group}</div>
      ${items.map(i=>{
        const bc=getBadgeCount(i.id);
        return`<div class="nav-item" id="nav-${i.id}" onclick="showPage('${i.id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[i.icon]||''}</svg>
          ${i.label}
          ${bc?`<span class="nav-badge">${bc}</span>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}
function showPage(id){
  if(!can(id)){toast('Access denied for your role','error');return;}
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const pg=document.getElementById('pg-'+id);
  if(pg){pg.classList.add('active');renderPage(id,pg);}
  const nav=document.getElementById('nav-'+id);
  if(nav)nav.classList.add('active');
  const titles={dashboard:'Dashboard',inventory:'Components',movements:'Stock Movements',workorders:'Work Orders',bom:'BOM Matching',itemcodes:'Item Codes',indents:'Indents & Issues',pr:'Purchase Requests',grn:'Goods Inward & QC',settings:'Settings'};
  document.getElementById('topbar-title').textContent=titles[id]||id;
}

function renderInvTable(){
  const f=invFilter;
  let items=DB.inventory.filter(i=>{
    const q=f.search.toLowerCase();
    if(q&&!i.id.toLowerCase().includes(q)&&!i.desc.toLowerCase().includes(q)&&!i.mpn.toLowerCase().includes(q)&&!i.mfr.toLowerCase().includes(q))return false;
    if(f.cat&&i.cat!==f.cat)return false;
    if(f.type&&i.type!==f.type)return false;
    return true;
  });
  const cnt=document.getElementById('inv-count');
  if(cnt)cnt.textContent=`${items.length} of ${DB.inventory.length} items`;
  const wrap=document.getElementById('inv-table-wrap');
  if(!wrap)return;
  if(!items.length){wrap.innerHTML=`<div class="empty-state">${icon('box',36)}<p>No components match your filters</p></div>`;return;}

function addComponent(){
  if(DB.currentUser.role!=='erp_team'){toast('Only ERP Team can add components','error');closeModal();return;}
  const desc=document.getElementById('nc-desc').value.trim();
  const mfr=document.getElementById('nc-mfr').value.trim();
  const mpn=document.getElementById('nc-mpn').value.trim();
  if(!desc||!mfr||!mpn){toast('Please fill description, manufacturer and MPN','error');return;}
  const cat=document.getElementById('nc-cat').value;
  const prefix=cat.slice(0,3).toUpperCase();
  const id=document.getElementById('nc-id').value.trim()||`GX-${prefix}-${String(DB.inventory.length+1).padStart(3,'0')}`;
  if(DB.inventory.find(i=>i.id===id)){toast('Part number already exists','error');return;}
  const qty=parseInt(document.getElementById('nc-qty').value)||0;
  DB.inventory.push({id,desc,mfr,mpn,qty,reserved:0,alert:parseInt(document.getElementById('nc-alert').value)||10,location:document.getElementById('nc-loc').value||'—',cat,type:document.getElementById('nc-type').value});
  if(qty>0)DB.movements.unshift({date:new Date().toISOString().slice(0,16).replace('T',' '),gpn:id,desc,type:'received',qty,ref:'INIT-'+Date.now(),project:'—',user:DB.currentUser.name.split(' ')[0]});

}

  buildNav();
  renderWorkOrders(document.getElementById('pg-workorders'));

  if(by==='erp')w.erpStatus='rejected';
  else w.ctoStatus='rejected';
  w.status='rejected';

  buildNav();
  renderWorkOrders(document.getElementById('pg-workorders'));
}

          <div style="display:flex;align-items:center;justify-content:space-between"><span style="color:var(--danger)">${icon('x',13)} Not available</span><span id="bom-cnt-bad" class="td-mono" style="font-size:16px;font-weight:700">—</span></div>

function addBomItem(){
  const input=document.getElementById('bom-search-input');
  const val=input.value.trim();
  if(!val)return;
  const inv=DB.inventory.find(i=>i.id===val||i.desc.toLowerCase().includes(val.toLowerCase()));
  if(!inv){toast('Component not found in inventory','error');return;}
  if(window._bomItems.find(x=>x.id===inv.id)){toast('Already added','warn');return;}
  const qty=prompt(`How many ${inv.id} do you need?`,'1');
  if(!qty)return;
  window._bomItems.push({id:inv.id,need:parseInt(qty)||1});
  input.value='';
  renderBomSelectedList();
}
function renderBomSelectedList(){
  const el=document.getElementById('bom-selected-list');
  if(!el)return;
  el.innerHTML=window._bomItems.map((b,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span class="td-mono" style="color:var(--info)">${b.id}</span>
      <span style="flex:1;color:var(--text3)">${DB.inventory.find(x=>x.id===b.id)?.desc||''}</span>
      <span style="color:var(--text3)">Qty: <strong style="color:var(--text)">${b.need}</strong></span>
      <button class="btn btn-ghost btn-sm" onclick="window._bomItems.splice(${i},1);renderBomSelectedList()">${icon('x',10)}</button>
    </div>`).join('');
}
function runBomMatch(){
  const woId=document.getElementById('bom-wo')?.value;
  if(!window._bomItems.length){toast('Add at least one component to match','warn');return;}
  let ok=0,warn=0,bad=0;
  const results=window._bomItems.map(b=>{
    const inv=DB.inventory.find(i=>i.id===b.id);
    if(!inv)return{...b,status:'bad',avail:0,total:0};
    const avail=inv.qty-inv.reserved;
    if(avail>=b.need){ok++;return{...b,status:'ok',avail,total:inv.qty,desc:inv.desc};}
    if(inv.qty>=b.need){warn++;return{...b,status:'warn',avail,total:inv.qty,desc:inv.desc};}
    bad++;return{...b,status:'bad',avail,total:inv.qty,desc:inv.desc};
  });
  document.getElementById('bom-cnt-ok').textContent=ok;
  document.getElementById('bom-cnt-warn').textContent=warn;
  document.getElementById('bom-cnt-bad').textContent=bad;
  const actionsEl=document.getElementById('bom-actions');
  if(actionsEl){
    actionsEl.style.display='flex';
    actionsEl.innerHTML=`
      ${bad>0?`<button class="btn btn-warn" onclick="showPage('pr')">${icon('shopping-cart')} Raise PR for ${bad} missing items</button>`:''}
      ${bad>0?`<button class="btn btn-ghost" onclick="showPage('itemcodes')">${icon('tag')} Request item codes for unknowns</button>`:''}
      ${(ok+warn)>0?`<button class="btn btn-ghost" onclick="toast('Stock reserved for '+document.getElementById('bom-wo').value,'success')">${icon('check')} Reserve available stock</button>`:''}
    `;
  }
  const card=document.getElementById('bom-results-card');
  const body=document.getElementById('bom-results-body');
  const title=document.getElementById('bom-results-title');
  if(card&&body&&title){
    card.style.display='block';
    title.textContent=`Match Results — ${woId||'Manual BOM'}`;
    body.innerHTML=results.map(r=>{
      const cls=r.status==='ok'?'bom-ok':r.status==='warn'?'bom-warn':'bom-bad';
      const ic=r.status==='ok'?'✓':r.status==='warn'?'⚠':'✕';
      const stag=r.status==='ok'?'tag-green':r.status==='warn'?'tag-yellow':'tag-red';
      const slabel=r.status==='ok'?'In Stock':r.status==='warn'?'Partially Reserved':'Not Available';
      return`<div class="bom-item">
        <div class="bom-status-icon ${cls}">${ic}</div>
        <div class="bom-name"><div class="bom-part">${r.desc||r.id}</div><div class="bom-code">${r.id}</div></div>
        <div class="bom-qty">Need ${r.need} · Have ${r.avail} free</div>
        <span class="tag ${stag}">${slabel}</span>
        ${r.status==='bad'?`<button class="btn btn-ghost btn-sm" onclick="showPage('pr')">${icon('shopping-cart',11)} Raise PR</button>`:''}
      </div>`;
    }).join('');
  }
  toast(`BOM matched: ${ok} available, ${warn} partial, ${bad} missing`);
}

function issueIndent(id){
  const ind=DB.indents.find(x=>x.id===id);if(!ind)return;
  const inv=DB.inventory.find(i=>i.id===ind.gpn);
  if(inv){
    if(inv.qty-inv.reserved<ind.qty){toast('Insufficient available stock','error');return;}
    inv.qty-=ind.qty;
  }
  ind.status='issued';
  DB.movements.unshift({date:new Date().toISOString().slice(0,16).replace('T',' '),gpn:ind.gpn,desc:ind.desc,type:'issued',qty:-ind.qty,ref:ind.id,project:ind.project,user:DB.currentUser.name.split(' ')[0]});

  renderIndents(document.getElementById('pg-indents'));
}

      <div class="form-group"><label class="form-label">SUPPLIER NAME</label><input class="form-control" id="aq-supplier" placeholder="e.g. Mouser Electronics"></div>
      <div class="form-group"><label class="form-label">QUOTATION AMOUNT</label><input class="form-control" id="aq-quote" placeholder="e.g. ₹12,500"></div>
      <div class="form-group span2"><label class="form-label">NOTES</label><textarea class="form-control" id="aq-notes" placeholder="Delivery time, terms, etc."></textarea></div>
    </div>
  `,`<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveQuotation('${id}')">Save Quotation</button>`);
}
function saveQuotation(id){
  const p=DB.purchaseRequests.find(x=>x.id===id);if(!p)return;
  p.supplier=document.getElementById('aq-supplier').value;
  p.quotation=document.getElementById('aq-quote').value;
  p.status='quotation';
  closeModal();
  toast('Quotation saved for '+id);
  renderPR(document.getElementById('pg-pr'));
}
function raisePO(id){
  const p=DB.purchaseRequests.find(x=>x.id===id);if(!p)return;
  p.status='po_raised';
  toast('PO raised for '+id);
  renderPR(document.getElementById('pg-pr'));
}
function closePR(id){
  const p=DB.purchaseRequests.find(x=>x.id===id);if(!p)return;
  p.status='closed';
  const inv=DB.inventory.find(i=>i.id===p.gpn);
  if(inv){inv.qty+=p.qty;DB.movements.unshift({date:new Date().toISOString().slice(0,16).replace('T',' '),gpn:p.gpn,desc:p.component,type:'received',qty:p.qty,ref:id,project:p.project,user:DB.currentUser.name.split(' ')[0]});}
  toast('PR '+id+' closed — stock updated');
  renderPR(document.getElementById('pg-pr'));
}
function viewPR(id){
  const p=DB.purchaseRequests.find(x=>x.id===id);if(!p)return;
  const [tc,tl]=prStatusTag(p.status);
  openModal(p.id+' — '+p.component,`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><div class="form-label" style="margin-bottom:4px">GALAXI PN</div><div class="td-mono">${p.gpn}</div></div>
      <div><div class="form-label" style="margin-bottom:4px">QUANTITY</div><div style="font-size:22px;font-weight:700;font-family:var(--mono);color:var(--info)">${p.qty}</div></div>
      <div><div class="form-label" style="margin-bottom:4px">PROJECT</div><div>${p.project}</div></div>
      <div><div class="form-label" style="margin-bottom:4px">STATUS</div><span class="tag ${tc}">${tl}</span></div>
      <div><div class="form-label" style="margin-bottom:4px">SUPPLIER</div><div>${p.supplier||'Not assigned'}</div></div>
      <div><div class="form-label" style="margin-bottom:4px">QUOTATION</div><div class="td-mono" style="color:var(--accent)">${p.quotation||'Pending'}</div></div>
      <div><div class="form-label" style="margin-bottom:4px">REQUESTED BY</div><div>${p.by}</div></div>
      <div><div class="form-label" style="margin-bottom:4px">DATE</div><div style="color:var(--text3)">${p.createdAt}</div></div>
    </div>
  `);
}
function showNewPRModal(){
  openModal('New Purchase Request',`
    <div class="form-grid">
      <div class="form-group span2"><label class="form-label">COMPONENT</label><input class="form-control" id="np-comp" placeholder="Component description"></div>
      <div class="form-group"><label class="form-label">GALAXI PN</label>
        <input class="form-control" id="np-gpn" placeholder="GX-XXX-000" list="pr-datalist">
        <datalist id="pr-datalist">${DB.inventory.map(i=>`<option value="${i.id}">${i.desc}</option>`).join('')}</datalist>
      </div>
      <div class="form-group"><label class="form-label">QUANTITY</label><input class="form-control" id="np-qty" type="number" min="1" value="1"></div>
      <div class="form-group"><label class="form-label">PROJECT</label>
        <select class="form-control" id="np-project">
          <option value="General Stock">General Stock</option>
          ${DB.workorders.filter(w=>w.status==='active').map(w=>`<option value="${w.title}">${w.title}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">URGENCY</label>
        <select class="form-control" id="np-urgency"><option>Normal</option><option>Urgent</option><option>Critical</option></select>
      </div>
    </div>
  `,`<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="submitPR()">Submit PR</button>`);
}
function submitPR(){
  const comp=document.getElementById('np-comp').value.trim();
  const gpn=document.getElementById('np-gpn').value.trim();
  const qty=parseInt(document.getElementById('np-qty').value)||0;
  if(!comp||qty<1){toast('Component and quantity are required','error');return;}
  const id='PR-'+new Date().getFullYear()+'-'+String(DB.purchaseRequests.length+19).padStart(3,'0');
  DB.purchaseRequests.unshift({id,component:comp,gpn:gpn||'TBD',qty,project:document.getElementById('np-project').value,by:DB.currentUser.name,byId:DB.currentUser.id,supplier:'',quotation:'',status:'open',createdAt:new Date().toISOString().slice(0,10)});
  closeModal();
  toast('PR '+id+' submitted to purchase team');
  renderPR(document.getElementById('pg-pr'));
}
function exportPR(){
  const header='PR Number,Component,Galaxi PN,Qty,Project,Requested by,Supplier,Quotation,Status\n';
  const rows=DB.purchaseRequests.map(p=>`${p.id},"${p.component}",${p.gpn},${p.qty},"${p.project}",${p.by},"${p.supplier}","${p.quotation}",${p.status}`).join('\n');
  const blob=new Blob([header+rows],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='purchase_requests.csv';a.click();
  toast('PR list exported');
}

// ── GRN ──
function renderGRN(el){
  el.innerHTML=`
  <div class="page-header">
    <div class="page-header-left"><h1>Goods Inward & QC</h1><p>Receive materials, perform QC, and update stock</p></div>
    <div class="page-header-right">
      <button class="btn btn-primary" onclick="showNewGRNModal()">${icon('plus')} New GRN</button>
    </div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-header"><div class="card-title">Quick GRN Entry</div></div>
      <div class="card-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">PO / PR REFERENCE</label><input class="form-control" id="grn-pr" placeholder="PR-2024-017"></div>
          <div class="form-group"><label class="form-label">SUPPLIER</label><input class="form-control" id="grn-sup" placeholder="Mouser Electronics"></div>
          <div class="form-group"><label class="form-label">GALAXI PN</label>
            <input class="form-control" id="grn-gpn" placeholder="GX-XXX-000" list="grn-datalist">
            <datalist id="grn-datalist">${DB.inventory.map(i=>`<option value="${i.id}">${i.desc}</option>`).join('')}</datalist>
          </div>
          <div class="form-group"><label class="form-label">QTY RECEIVED</label><input class="form-control" id="grn-qty" type="number" min="1" placeholder="0"></div>
          <div class="form-group"><label class="form-label">QC STATUS</label>
            <select class="form-control" id="grn-qc"><option value="pending">Pending</option><option value="pass">Pass</option><option value="fail">Fail</option></select>
          </div>
          <div class="form-group"><label class="form-label">STORAGE LOCATION</label><input class="form-control" id="grn-loc" placeholder="Rack A2-B3"></div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:14px;justify-content:center" onclick="submitGRN()">
          ${icon('package')} Save GRN & Update Stock
        </button>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Recent GRNs</div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>GRN</th><th>Component</th><th>Qty</th><th>QC</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${DB.grn.map(g=>{
            const [qt,ql]=grnQcTag(g.qcStatus);
            const [st,sl]=grnStatusTag(g.status);
            return`<tr>
              <td class="td-main td-mono">${g.id}</td>
              <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${g.component}</td>
              <td class="td-mono">${g.qtyReceived}</td>
              <td><span class="tag ${qt}">${ql}</span></td>
              <td><span class="tag ${st}">${sl}</span></td>
              <td>
                ${g.qcStatus==='pending'?`<button class="btn btn-primary btn-sm" onclick="passQC('${g.id}')">${icon('check',11)}</button><button class="btn btn-danger btn-sm" onclick="failQC('${g.id}')">${icon('x',11)}</button>`:''}
              </td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">QC Statistics</div></div>
    <div class="card-body">
      <div class="grid3">
        <div style="text-align:center">
          <div style="font-size:32px;font-weight:700;font-family:var(--mono);color:var(--accent)">${DB.grn.filter(g=>g.qcStatus==='pass').length}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">QC PASSED</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:32px;font-weight:700;font-family:var(--mono);color:var(--warn)">${DB.grn.filter(g=>g.qcStatus==='pending').length}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">PENDING QC</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:32px;font-weight:700;font-family:var(--mono);color:var(--danger)">${DB.grn.filter(g=>g.qcStatus==='fail').length}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">QC FAILED</div>
        </div>
      </div>
    </div>
  </div>`;
}
function submitGRN(){
  const gpn=document.getElementById('grn-gpn').value.trim();
  const qty=parseInt(document.getElementById('grn-qty').value)||0;
  const qc=document.getElementById('grn-qc').value;
  const sup=document.getElementById('grn-sup').value.trim();
  const pr=document.getElementById('grn-pr').value.trim();
  const loc=document.getElementById('grn-loc').value.trim();
  if(!gpn||qty<1){toast('Component and quantity are required','error');return;}
  const inv=DB.inventory.find(i=>i.id===gpn);
  const id='GRN-'+String(DB.grn.length+109).padStart(3,'0');
  const grnEntry={id,prRef:pr||'MANUAL',component:inv?.desc||gpn,gpn,supplier:sup,qtyReceived:qty,qcStatus:qc,location:loc||'Quarantine',status:qc==='pass'?'stocked':qc==='fail'?'rejected':'qc_hold',createdAt:new Date().toISOString().slice(0,10),by:DB.currentUser.name};
  DB.grn.unshift(grnEntry);
  if(qc==='pass'&&inv){
    inv.qty+=qty;
    if(loc)inv.location=loc;
    DB.movements.unshift({date:new Date().toISOString().slice(0,16).replace('T',' '),gpn,desc:inv.desc,type:'received',qty,ref:id,project:'—',user:DB.currentUser.name.split(' ')[0]});
    toast(id+' saved — '+qty+' units stocked');
  } else {
    toast(id+' saved — awaiting QC decision',qc==='fail'?'error':'info');
  }
  renderGRN(document.getElementById('pg-grn'));
}
function passQC(id){
  const g=DB.grn.find(x=>x.id===id);if(!g)return;
  g.qcStatus='pass';g.status='stocked';
  const inv=DB.inventory.find(i=>i.id===g.gpn);
  if(inv){inv.qty+=g.qtyReceived;DB.movements.unshift({date:new Date().toISOString().slice(0,16).replace('T',' '),gpn:g.gpn,desc:g.component,type:'received',qty:g.qtyReceived,ref:id,project:'—',user:DB.currentUser.name.split(' ')[0]});}
  toast(id+' QC passed — stock updated');
  renderGRN(document.getElementById('pg-grn'));
}
function failQC(id){
  const g=DB.grn.find(x=>x.id===id);if(!g)return;
  g.qcStatus='fail';g.status='rejected';g.location='Rejected Bin';
  DB.movements.unshift({date:new Date().toISOString().slice(0,16).replace('T',' '),gpn:g.gpn,desc:g.component,type:'rejected',qty:g.qtyReceived,ref:id,project:'—',user:DB.currentUser.name.split(' ')[0]});
  toast(id+' QC failed — items moved to reject bin','error');
  renderGRN(document.getElementById('pg-grn'));
}
function showNewGRNModal(){toast('Use the Quick GRN Entry panel on this page','info');}

// ── GLOBAL SEARCH ──
function globalSearch(q){
  if(!q.trim())return;
  if(q.startsWith('GX-')){showPage('inventory');setTimeout(()=>{const s=document.getElementById('inv-table-wrap')?.closest('.page');if(s){invFilter.search=q;renderInvTable();}},100);}
  else if(q.startsWith('WO-')){showPage('workorders');}
  else if(q.startsWith('PR-')){showPage('pr');}
  else if(q.startsWith('IC-')){showPage('itemcodes');}
}

// ── NOTIFICATIONS ──
function toggleNotifications(){
  const lowStock=DB.inventory.filter(i=>i.qty<=i.alert);
  const pending=DB.workorders.filter(w=>w.status==='erp_review'||w.status==='cto_approval');
  const msgs=[
    ...lowStock.slice(0,3).map(i=>`Low stock: ${i.id} (${i.qty} remaining, limit ${i.alert})`),
    ...pending.slice(0,2).map(w=>`WO pending: ${w.id} — ${w.title}`),
  ];
  if(!msgs.length){toast('No new notifications','info');return;}
  openModal('Notifications',`<div style="display:flex;flex-direction:column;gap:8px">
    ${msgs.map(m=>`<div class="alert-banner alert-warn">${icon('alert-triangle')} ${m}</div>`).join('')}
  </div>`);
}
